name: Validate Forgis

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate Forgis scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Forgis
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f requirements.txt
          test -f agent/forge.py
          test -f agent/model_env.py
          test -f agent/forgis_config.py
          test -f agent/resolve_config.py
          test -f agent/guardrails.py
          test -f agent/write_run_log.py
          test -f agent/deepseek_agent.py
          test -f agent/openai_compatible_client.py
          test -f agent/cli.py
          test -f agent/file_tools.py
          test -f agent/tool_loop.py
          test -f agent/validate_target_output.py
          test -f agent/visual_evidence.py
          test -f agent/qwen_vision.py
          test -f agent/build_target.sh
          test -f agent/create_pr.sh
          test -f .github/workflows/migrate.yml
          test -f tests/test_forgis_config.py
          test -f tests/test_openai_compatible_client.py
          test -f tests/test_v7_cli_config.py
          test -f tests/test_v7_local_cli.py
          test -f tests/test_v7_local_smoke.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile agent/forge.py agent/forgis_config.py agent/resolve_config.py agent/guardrails.py agent/write_run_log.py agent/model_env.py agent/deepseek_agent.py agent/openai_compatible_client.py agent/cli.py agent/file_tools.py agent/tool_loop.py agent/visual_evidence.py agent/qwen_vision.py

      - name: Run Forgis tests
        run: |
          python -m unittest tests/test_forgis_config.py tests/test_openai_compatible_client.py tests/test_v7_cli_config.py tests/test_v7_local_cli.py tests/test_v7_local_smoke.py

      - name: Check shell script syntax
        run: |
          bash -n agent/build_target.sh
          bash -n agent/create_pr.sh

      - name: Run controller smoke test
        run: |
          mkdir -p tmp/source tmp/target
          printf '%s\n' \
            'source_repo: owner/source-repo' \
            'source_ref: main' \
            'target_subdir: target-output' \
            'task_prompt_path: FORGIS_TASK.md' \
            'agent_backend: deepseek' \
            'model: deepseek-v4-pro' \
            'target_branch: forgis/output' \
            'target_base_branch: main' \
            'run_log_path: target-output/FORGIS_LOG.md' \
            'dry_run: true' \
            'run_agent: false' \
            'confirm_real_run: false' \
            > tmp/target/FORGIS_CONFIG.yml
          printf '%s\n' '# Task' '' 'Use mock files only.' > tmp/target/FORGIS_TASK.md

          python agent/forge.py \
            --source "$GITHUB_WORKSPACE/tmp/source" \
            --target "$GITHUB_WORKSPACE/tmp/target" \
            --target-repo "owner/target-repo" \
            --summary-output "$GITHUB_WORKSPACE/tmp/run_summary.md"

      - name: Check diff whitespace
        run: |
          git diff --check
