name: Forgis Migration Scaffold

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repository, for example owner/apple-source-repo"
        required: true
        default: "Vita0818/Forgis"
        type: string

      source_ref:
        description: "Source branch, tag, or commit"
        required: true
        default: "main"
        type: string

      target_repo:
        description: "Target output repository, for example owner/target-output-repo"
        required: true
        default: "Vita0818/Forgis"
        type: string

      target_platform:
        description: "Target platform"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - windows
          - harmonyos
          - web

      target_stack:
        description: "Target technical stack, for example kotlin-compose, csharp-avalonia, arkts, web-react"
        required: true
        default: "kotlin-compose"
        type: string

      migration_profile:
        description: "Migration profile, for example default or local-first-app"
        required: true
        default: "default"
        type: string

      target_branch:
        description: "Target migration branch"
        required: true
        default: "forgis/android-from-source"
        type: string

      dry_run:
        description: "Run without pushing changes or creating pull requests"
        required: true
        default: true
        type: boolean

      run_ai:
        description: "Actually run Aider with the configured AI model"
        required: true
        default: false
        type: boolean

      aider_model:
        description: "Aider model name"
        required: true
        default: "deepseek/deepseek-chat"
        type: string

permissions:
  contents: read

jobs:
  scaffold:
    name: Run Forgis migration scaffold
    runs-on: ubuntu-latest

    env:
      SOURCE_REPO: ${{ inputs.source_repo }}
      SOURCE_REF: ${{ inputs.source_ref }}
      TARGET_REPO: ${{ inputs.target_repo }}
      TARGET_PLATFORM: ${{ inputs.target_platform }}
      TARGET_STACK: ${{ inputs.target_stack }}
      MIGRATION_PROFILE: ${{ inputs.migration_profile }}
      TARGET_BRANCH: ${{ inputs.target_branch }}
      DRY_RUN: ${{ inputs.dry_run }}
      RUN_AI: ${{ inputs.run_ai }}
      AIDER_MODEL: ${{ inputs.aider_model }}

    steps:
      - name: Checkout Forgis
        uses: actions/checkout@v4
        with:
          path: forgis

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.FORGIS_GITHUB_TOKEN || github.token }}
          path: source-repo

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.FORGIS_GITHUB_TOKEN || github.token }}
          path: target-output
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies and Aider
        run: |
          python -m pip install --upgrade pip
          pip install -r forgis/requirements.txt
          pip install aider-chat

      - name: Check Aider installation
        run: |
          aider --version

      - name: Run Forgis controller
        run: |
          python forgis/agent/forge.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --target "$GITHUB_WORKSPACE/target-output" \
            --rules "$GITHUB_WORKSPACE/forgis/rules" \
            --platform "$TARGET_PLATFORM" \
            --target-stack "$TARGET_STACK" \
            --migration-profile "$MIGRATION_PROFILE" \
            --target-branch "$TARGET_BRANCH" \
            --dry-run "$DRY_RUN" \
            --run-ai "$RUN_AI"

      - name: Collect source bundle
        run: |
          mkdir -p "$GITHUB_WORKSPACE/forgis-runtime"

          python forgis/agent/collect_source.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --output "$GITHUB_WORKSPACE/forgis-runtime/source_bundle.md"

      - name: Build Forgis migration prompt
        run: |
          mkdir -p "$GITHUB_WORKSPACE/forgis-runtime"

          python forgis/agent/build_prompt.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --target "$GITHUB_WORKSPACE/target-output" \
            --rules "$GITHUB_WORKSPACE/forgis/rules" \
            --prompts "$GITHUB_WORKSPACE/forgis/prompts" \
            --platform "$TARGET_PLATFORM" \
            --target-stack "$TARGET_STACK" \
            --migration-profile "$MIGRATION_PROFILE" \
            --source-bundle "$GITHUB_WORKSPACE/forgis-runtime/source_bundle.md" \
            --output "$GITHUB_WORKSPACE/forgis-runtime/forgis_prompt.md"

          test -f "$GITHUB_WORKSPACE/forgis-runtime/forgis_prompt.md"

      - name: Check shell scaffolds
        run: |
          bash -n forgis/agent/run_aider.sh
          bash -n forgis/agent/build_target.sh
          bash -n forgis/agent/create_pr.sh

      - name: Run Aider with configured model
        if: ${{ inputs.run_ai == true || inputs.run_ai == 'true' }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_REPO_DIR: ${{ github.workspace }}/target-output
          FORGIS_PROMPT_FILE: ${{ github.workspace }}/forgis-runtime/forgis_prompt.md
          AIDER_MODEL: ${{ inputs.aider_model }}
        run: |
          bash forgis/agent/run_aider.sh

      - name: Build target repository
        if: ${{ inputs.run_ai == true || inputs.run_ai == 'true' }}
        env:
          TARGET_REPO_DIR: ${{ github.workspace }}/target-output
          TARGET_PLATFORM: ${{ inputs.target_platform }}
        run: |
          bash forgis/agent/build_target.sh

      - name: Create pull request
        if: ${{ (inputs.run_ai == true || inputs.run_ai == 'true') && inputs.dry_run == false }}
        env:
          GH_TOKEN: ${{ secrets.FORGIS_GITHUB_TOKEN || github.token }}
          TARGET_REPO_DIR: ${{ github.workspace }}/target-output
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          TARGET_PLATFORM: ${{ inputs.target_platform }}
          TARGET_STACK: ${{ inputs.target_stack }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          bash forgis/agent/create_pr.sh

      - name: Upload migration report
        uses: actions/upload-artifact@v4
        with:
          name: forgis-migration-report
          path: target-output/MIGRATION_REPORT.md

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: forgis-source-bundle
          path: forgis-runtime/source_bundle.md

      - name: Upload generated Forgis prompt
        uses: actions/upload-artifact@v4
        with:
          name: forgis-generated-prompt
          path: forgis-runtime/forgis_prompt.md

      - name: Upload target output snapshot
        uses: actions/upload-artifact@v4
        with:
          name: forgis-target-output
          path: target-output
