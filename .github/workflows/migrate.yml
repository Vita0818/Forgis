name: Forgis DeepSeek Interface

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repository containing FORGIS_CONFIG.yml and the task file, for example owner/target-repo"
        required: true
        type: string

permissions:
  contents: read

jobs:
  run:
    name: Run Forgis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Forgis
        uses: actions/checkout@v4
        with:
          path: forgis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r forgis/requirements.txt

      - name: Checkout target repository
        id: checkout_target
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.FORGIS_TARGET_TOKEN }}
          path: target-repo
          fetch-depth: 0

      - name: Resolve Forgis config
        id: resolve
        run: |
          mkdir -p "$GITHUB_WORKSPACE/forgis-runtime"

          python forgis/agent/resolve_config.py \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-repo "${{ inputs.target_repo }}" \
            --github-env "$GITHUB_ENV" \
            --github-output "$GITHUB_OUTPUT" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/resolved_config.md"

      - name: Checkout resolved target base branch
        id: checkout_target_base
        run: |
          cd "$GITHUB_WORKSPACE/target-repo"
          git fetch origin "$TARGET_BASE_BRANCH"
          git checkout -B "$TARGET_BASE_BRANCH" "origin/$TARGET_BASE_BRANCH"

      - name: Resolve Forgis config from base branch
        id: resolve_base
        run: |
          python forgis/agent/resolve_config.py \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-repo "${{ inputs.target_repo }}" \
            --github-env "$GITHUB_ENV" \
            --github-output "$GITHUB_OUTPUT" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/resolved_config.md"

      - name: Checkout source repository read-only
        id: checkout_source
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve_base.outputs.source_repo }}
          ref: ${{ steps.resolve_base.outputs.source_ref }}
          token: ${{ secrets.FORGIS_SOURCE_TOKEN }}
          path: source-repo
          persist-credentials: false

      - name: Snapshot read-only target inputs
        id: snapshot_readonly
        if: ${{ steps.checkout_source.outcome == 'success' }}
        run: |
          python forgis/agent/guardrails.py snapshot-readonly \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --config-path "$CONFIG_PATH" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --output "$GITHUB_WORKSPACE/forgis-runtime/read_only_snapshot.json"

      - name: Snapshot target output before agent
        id: snapshot_target_output
        if: ${{ steps.snapshot_readonly.outcome == 'success' }}
        run: |
          python forgis/agent/validate_target_output.py snapshot \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-subdir "$TARGET_SUBDIR" \
            --output "$GITHUB_WORKSPACE/forgis-runtime/target_output_before.json"

      - name: Run Forgis controller
        id: run_controller
        if: ${{ steps.snapshot_readonly.outcome == 'success' && steps.snapshot_target_output.outcome == 'success' }}
        run: |
          python forgis/agent/forge.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-repo "$TARGET_REPO" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/run_summary.md"

      - name: Check shell scripts
        id: check_shell_scripts
        if: ${{ steps.run_controller.outcome == 'success' }}
        run: |
          bash -n forgis/agent/build_target.sh
          bash -n forgis/agent/create_pr.sh

      - name: Run DeepSeek tool loop
        id: tool_loop
        if: ${{ steps.run_controller.outcome == 'success' && steps.check_shell_scripts.outcome == 'success' }}
        env:
          FORGIS_MODEL_API_KEY: ${{ secrets.FORGIS_MODEL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [[ "$RUN_AGENT" != "true" ]]; then
            echo "RUN_AGENT is false. Skipping DeepSeek execution."
            python forgis/agent/tool_loop.py \
              --source "$GITHUB_WORKSPACE/source-repo" \
              --target "$GITHUB_WORKSPACE/target-repo" \
              --target-repo "$TARGET_REPO" \
              --status-output "$GITHUB_WORKSPACE/forgis-runtime/deepseek_status.env" \
              --operation-log-output "$GITHUB_WORKSPACE/forgis-runtime/tool_operations.json" \
              --summary-output "$GITHUB_WORKSPACE/forgis-runtime/tool_loop_summary.json"
            exit 0
          fi

          python forgis/agent/tool_loop.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-repo "$TARGET_REPO" \
            --status-output "$GITHUB_WORKSPACE/forgis-runtime/deepseek_status.env" \
            --operation-log-output "$GITHUB_WORKSPACE/forgis-runtime/tool_operations.json" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/tool_loop_summary.json"

      - name: Verify source repository stayed read-only
        id: check_source_clean
        if: ${{ steps.checkout_source.outcome == 'success' && steps.run_controller.outcome == 'success' && steps.tool_loop.outcome == 'success' }}
        run: |
          python forgis/agent/guardrails.py check-source-clean \
            --source "$GITHUB_WORKSPACE/source-repo"

      - name: Validate DeepSeek target changes
        id: validate_target_output
        if: ${{ steps.run_controller.outcome == 'success' && steps.snapshot_target_output.outcome == 'success' && steps.tool_loop.outcome == 'success' && steps.check_source_clean.outcome == 'success' }}
        run: |
          if [[ "$RUN_AGENT" != "true" ]]; then
            echo "RUN_AGENT is false. Skipping target output validation."
            exit 0
          fi

          VALIDATE_ARGS=()
          if [[ "$STRICT_MODE" != "true" ]]; then
            echo "::warning::strict_mode=false; target output validation failures will be reported as warnings."
            VALIDATE_ARGS+=(--warning-only)
          fi

          python forgis/agent/validate_target_output.py validate \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-subdir "$TARGET_SUBDIR" \
            --run-log-path "$RUN_LOG_PATH" \
            --snapshot "$GITHUB_WORKSPACE/forgis-runtime/target_output_before.json" \
            --require-meaningful-change \
            --success-checks-json "$SUCCESS_CHECKS_JSON" \
            "${VALIDATE_ARGS[@]}"

      - name: Run configured validation commands
        id: validation_commands
        if: ${{ steps.run_controller.outcome == 'success' && steps.tool_loop.outcome == 'success' && steps.check_source_clean.outcome == 'success' && steps.validate_target_output.outcome == 'success' }}
        env:
          TARGET_REPO_DIR: ${{ github.workspace }}/target-repo
        run: |
          if [[ "$RUN_AGENT" != "true" ]]; then
            echo "RUN_AGENT is false. Skipping validation commands."
            exit 0
          fi

          set +e
          bash forgis/agent/build_target.sh
          VALIDATION_STATUS=$?
          set -e

          if [[ "$VALIDATION_STATUS" -ne 0 ]]; then
            if [[ "$STRICT_MODE" == "true" ]]; then
              echo "validation_commands failed and strict_mode=true; failing the run." >&2
              exit "$VALIDATION_STATUS"
            fi
            echo "::warning::validation_commands failed with exit $VALIDATION_STATUS; continuing because strict_mode=false."
          fi

      - name: Append long-term Forgis log
        id: append_log
        if: ${{ steps.run_controller.outcome == 'success' && steps.tool_loop.outcome == 'success' && steps.check_source_clean.outcome == 'success' && steps.validate_target_output.outcome == 'success' && steps.validation_commands.outcome == 'success' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DEEPSEEK_EXECUTED="false"
          DEEPSEEK_STATUS="not-run"
          TOOL_CALL_COUNT="0"
          READ_TOOL_COUNT="0"
          WRITE_TOOL_COUNT="0"
          FINAL_SUMMARY="DeepSeek was not run."
          if [[ -f "$GITHUB_WORKSPACE/forgis-runtime/deepseek_status.env" ]]; then
            source "$GITHUB_WORKSPACE/forgis-runtime/deepseek_status.env"
            DEEPSEEK_EXECUTED="${deepseek_executed:-false}"
            DEEPSEEK_STATUS="${deepseek_status:-not-run}"
            TOOL_CALL_COUNT="${tool_call_count:-0}"
            READ_TOOL_COUNT="${read_tool_count:-0}"
            WRITE_TOOL_COUNT="${write_tool_count:-0}"
            FINAL_SUMMARY="${final_summary:-DeepSeek was not run.}"
          fi

          python forgis/agent/write_run_log.py \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --source-repo "$SOURCE_REPO" \
            --source-ref "$SOURCE_REF" \
            --target-repo "$TARGET_REPO" \
            --target-base-branch "$TARGET_BASE_BRANCH" \
            --target-branch "$TARGET_BRANCH" \
            --target-subdir "$TARGET_SUBDIR" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --config-path "$CONFIG_PATH" \
            --agent-backend "$AGENT_BACKEND" \
            --model "$MODEL" \
            --run-log-path "$RUN_LOG_PATH" \
            --dry-run "$DRY_RUN" \
            --run-agent "$RUN_AGENT" \
            --run-agent-config "$RUN_AGENT_CONFIG" \
            --confirm-real-run "$CONFIRM_REAL_RUN" \
            --deepseek-executed "$DEEPSEEK_EXECUTED" \
            --deepseek-status "$DEEPSEEK_STATUS" \
            --tool-call-count "$TOOL_CALL_COUNT" \
            --read-tool-count "$READ_TOOL_COUNT" \
            --write-tool-count "$WRITE_TOOL_COUNT" \
            --guardrail-result "See workflow logs." \
            --validation-commands-json "$VALIDATION_COMMANDS_JSON" \
            --success-checks-json "$SUCCESS_CHECKS_JSON" \
            --append-target-log "$RUN_AGENT" \
            --run-id "${{ github.run_id }}" \
            --run-url "$RUN_URL" \
            --validation-result "See workflow logs." \
            --final-summary "$FINAL_SUMMARY" \
            --preview-output "$GITHUB_WORKSPACE/forgis-runtime/forgis_log_entry.md"

      - name: Verify read-only target inputs
        id: check_readonly
        if: ${{ steps.snapshot_readonly.outcome == 'success' && steps.run_controller.outcome == 'success' && steps.tool_loop.outcome == 'success' && steps.append_log.outcome == 'success' }}
        run: |
          READONLY_ARGS=()
          if [[ "$STRICT_MODE" != "true" ]]; then
            echo "::warning::strict_mode=false; target config/task modifications will be reported as warnings."
            READONLY_ARGS+=(--warning-only)
          fi

          python forgis/agent/guardrails.py check-readonly \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --snapshot "$GITHUB_WORKSPACE/forgis-runtime/read_only_snapshot.json" \
            "${READONLY_ARGS[@]}"

      - name: Verify target writable scope
        id: check_target_scope
        if: ${{ steps.run_controller.outcome == 'success' && steps.tool_loop.outcome == 'success' && steps.append_log.outcome == 'success' }}
        run: |
          TARGET_SCOPE_ARGS=()
          if [[ "$STRICT_MODE" != "true" ]]; then
            echo "::warning::strict_mode=false; target writable scope violations will be reported as warnings."
            TARGET_SCOPE_ARGS+=(--warning-only)
          fi

          python forgis/agent/guardrails.py check-target-scope \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-subdir "$TARGET_SUBDIR" \
            --read-only-path "$CONFIG_PATH" \
            --read-only-path "$TASK_PROMPT_PATH" \
            "${TARGET_SCOPE_ARGS[@]}"

      - name: Verify dry run did not write target
        id: check_dry_run_clean
        if: ${{ steps.run_controller.outcome == 'success' && steps.tool_loop.outcome == 'success' && steps.append_log.outcome == 'success' }}
        run: |
          if [[ "$DRY_RUN" == "true" ]]; then
            DRY_RUN_ARGS=()
            if [[ "$STRICT_MODE" != "true" ]]; then
              echo "::warning::strict_mode=false; dry-run target changes will be reported as warnings."
              DRY_RUN_ARGS+=(--warning-only)
            fi

            python forgis/agent/guardrails.py check-dry-run-clean \
              --target "$GITHUB_WORKSPACE/target-repo" \
              "${DRY_RUN_ARGS[@]}"
          else
            echo "DRY_RUN is false. Skipping dry-run clean check."
          fi

      - name: Verify model secrets were not written
        id: check_secret_leaks
        if: ${{ steps.run_controller.outcome == 'success' && steps.tool_loop.outcome == 'success' && steps.append_log.outcome == 'success' }}
        env:
          FORGIS_MODEL_API_KEY: ${{ secrets.FORGIS_MODEL_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python forgis/agent/guardrails.py check-secret-leaks \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-subdir "$TARGET_SUBDIR" \
            --model-env-json "$MODEL_ENV_JSON"

      - name: Show target repository diff
        if: always()
        run: |
          if [[ ! -d "$GITHUB_WORKSPACE/target-repo/.git" ]]; then
            echo "Target repository checkout is unavailable. Skipping target diff diagnostic."
            exit 0
          fi
          cd "$GITHUB_WORKSPACE/target-repo"
          echo "Git status:"
          git status --short || true
          echo "Git diff stat:"
          git diff --stat || true

      - name: Create pull request
        if: ${{ steps.resolve_base.outputs.dry_run == 'false' && steps.resolve_base.outputs.run_agent == 'true' && steps.resolve_base.outputs.confirm_real_run == 'true' && steps.validate_target_output.outcome == 'success' && steps.validation_commands.outcome == 'success' && steps.append_log.outcome == 'success' && steps.check_source_clean.outcome == 'success' && steps.check_readonly.outcome == 'success' && steps.check_target_scope.outcome == 'success' && steps.check_dry_run_clean.outcome == 'success' && steps.check_secret_leaks.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.FORGIS_TARGET_TOKEN }}
          TARGET_REPO_DIR: ${{ github.workspace }}/target-repo
        run: |
          if [[ "$RUN_AGENT" != "true" ]]; then
            echo "RUN_AGENT is false. Skipping push and pull request creation."
            exit 0
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY_RUN is true. Skipping push and pull request creation."
            exit 0
          fi

          if [[ "$CONFIRM_REAL_RUN" != "true" ]]; then
            echo "Real Forgis runs require confirm_real_run: true in FORGIS_CONFIG.yml."
            exit 1
          fi

          bash forgis/agent/create_pr.sh

      - name: Package target output snapshot
        if: always()
        run: |
          if [[ ! -d "$GITHUB_WORKSPACE/target-repo/.git" ]]; then
            echo "Target repository checkout is unavailable. Skipping target snapshot package."
            exit 0
          fi
          mkdir -p "$GITHUB_WORKSPACE/forgis-runtime"
          tar -czf "$GITHUB_WORKSPACE/forgis-runtime/target-repo-snapshot.tar.gz" \
            -C "$GITHUB_WORKSPACE" \
            target-repo

      - name: Upload resolved config summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-resolved-config
          path: forgis-runtime/resolved_config.md
          if-no-files-found: ignore

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-run-summary
          path: forgis-runtime/run_summary.md
          if-no-files-found: ignore

      - name: Upload DeepSeek tool loop summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-tool-loop
          path: |
            forgis-runtime/tool_loop_summary.json
            forgis-runtime/tool_operations.json
            forgis-runtime/deepseek_status.env
          if-no-files-found: ignore

      - name: Upload generated long log preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-long-log-preview
          path: forgis-runtime/forgis_log_entry.md
          if-no-files-found: ignore

      - name: Upload target output snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-target-repo
          path: forgis-runtime/target-repo-snapshot.tar.gz
          if-no-files-found: ignore
