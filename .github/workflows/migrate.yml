name: Forgis Aider Interface

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repository containing FORGIS_CONFIG.yml and FORGIS_TASK.md, for example owner/target-repo"
        required: true
        type: string

permissions:
  contents: read

jobs:
  run:
    name: Run Forgis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Forgis
        uses: actions/checkout@v4
        with:
          path: forgis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r forgis/requirements.txt

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.FORGIS_TARGET_TOKEN }}
          path: target-repo
          fetch-depth: 0

      - name: Resolve Forgis config
        id: resolve
        run: |
          mkdir -p "$GITHUB_WORKSPACE/forgis-runtime"

          python forgis/agent/resolve_config.py \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-repo "${{ inputs.target_repo }}" \
            --github-env "$GITHUB_ENV" \
            --github-output "$GITHUB_OUTPUT" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/resolved_config.md"

      - name: Checkout resolved target base branch
        run: |
          cd "$GITHUB_WORKSPACE/target-repo"
          git fetch origin "$TARGET_BASE_BRANCH"
          git checkout -B "$TARGET_BASE_BRANCH" "origin/$TARGET_BASE_BRANCH"

      - name: Resolve Forgis config from base branch
        id: resolve_base
        run: |
          python forgis/agent/resolve_config.py \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-repo "${{ inputs.target_repo }}" \
            --github-env "$GITHUB_ENV" \
            --github-output "$GITHUB_OUTPUT" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/resolved_config.md"

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve_base.outputs.source_repo }}
          ref: ${{ steps.resolve_base.outputs.source_ref }}
          token: ${{ secrets.FORGIS_SOURCE_TOKEN }}
          path: source-repo
          persist-credentials: false

      - name: Run Forgis controller
        run: |
          python forgis/agent/forge.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --source-repo "$SOURCE_REPO" \
            --source-ref "$SOURCE_REF" \
            --target-repo "$TARGET_REPO" \
            --target-branch "$TARGET_BRANCH" \
            --target-base-branch "$TARGET_BASE_BRANCH" \
            --config-path "$CONFIG_PATH" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --target-subdir "$TARGET_SUBDIR" \
            --run-log-path "$RUN_LOG_PATH" \
            --agent-backend "$AGENT_BACKEND" \
            --model "$AIDER_MODEL" \
            --dry-run "$DRY_RUN" \
            --run-agent "$RUN_AGENT" \
            --confirm-real-run "$CONFIRM_REAL_RUN" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/run_summary.md"

      - name: Build optional source context
        run: |
          if [[ "$SOURCE_CONTEXT_MODE" == "none" ]]; then
            echo "source_context.mode is none. Skipping source context collection."
            exit 0
          fi

          python forgis/agent/collect_source.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --mode "$SOURCE_CONTEXT_MODE" \
            --max-chars "$SOURCE_CONTEXT_MAX_CHARS" \
            --include-json "$SOURCE_CONTEXT_INCLUDE_JSON" \
            --exclude-json "$SOURCE_CONTEXT_EXCLUDE_JSON" \
            --output "$GITHUB_WORKSPACE/forgis-runtime/source_context.md"

      - name: Build Forgis Aider message
        run: |
          SOURCE_CONTEXT_ARGS=()
          if [[ -f "$GITHUB_WORKSPACE/forgis-runtime/source_context.md" ]]; then
            SOURCE_CONTEXT_ARGS+=(--source-context-file "$GITHUB_WORKSPACE/forgis-runtime/source_context.md")
          fi

          python forgis/agent/build_prompt.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --source-repo "$SOURCE_REPO" \
            --source-ref "$SOURCE_REF" \
            --target-repo "$TARGET_REPO" \
            --config-path "$CONFIG_PATH" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --require-task-prompt \
            --target-subdir "$TARGET_SUBDIR" \
            --run-log-path "$RUN_LOG_PATH" \
            "${SOURCE_CONTEXT_ARGS[@]}" \
            --output "$GITHUB_WORKSPACE/forgis-runtime/forgis_message.md"

          test -f "$GITHUB_WORKSPACE/forgis-runtime/forgis_message.md"

      - name: Diagnose Aider message
        run: |
          python forgis/agent/prompt_diagnostics.py \
            --file "$GITHUB_WORKSPACE/forgis-runtime/forgis_message.md" \
            --label "Forgis Aider Message" \
            --task-prompt-file "$GITHUB_WORKSPACE/target-repo/$TASK_PROMPT_PATH" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --source-path "$GITHUB_WORKSPACE/source-repo" \
            --target-path "$GITHUB_WORKSPACE/target-repo" \
            --target-subdir "$TARGET_SUBDIR" \
            --expected-same-as "$GITHUB_WORKSPACE/forgis-runtime/forgis_message.md" \
            --artifact-output "$GITHUB_WORKSPACE/forgis-runtime/message_diagnostics.md"

      - name: Check shell scripts
        run: |
          bash -n forgis/agent/run_aider.sh
          bash -n forgis/agent/build_target.sh
          bash -n forgis/agent/create_pr.sh

      - name: Install and check Aider if enabled
        run: |
          if [[ "$RUN_AGENT" != "true" ]]; then
            echo "RUN_AGENT is false. Skipping Aider installation."
            exit 0
          fi

          pip install aider-chat
          aider --version

      - name: Run Aider with configured model
        env:
          SOURCE_REPO_DIR: ${{ github.workspace }}/source-repo
          TARGET_REPO_DIR: ${{ github.workspace }}/target-repo
          FORGIS_PROMPT_FILE: ${{ github.workspace }}/forgis-runtime/forgis_message.md
          SOURCE_CONTEXT_FILE: ${{ github.workspace }}/forgis-runtime/source_context.md
          FORGIS_AIDER_DIAGNOSTICS_FILE: ${{ github.workspace }}/forgis-runtime/aider_message_diagnostics.md
          FORGIS_AIDER_COMMAND_SUMMARY_FILE: ${{ github.workspace }}/forgis-runtime/aider_command_summary.md
          FORGIS_AIDER_STATUS_FILE: ${{ github.workspace }}/forgis-runtime/aider_status.env
          FORGIS_MODEL_API_KEY: ${{ secrets.FORGIS_MODEL_API_KEY }}
          PROVIDER_API_KEY: ${{ secrets.PROVIDER_API_KEY }}
        run: |
          if [[ "$RUN_AGENT" != "true" ]]; then
            echo "RUN_AGENT is false. Skipping Aider execution."
            exit 0
          fi

          if [[ ! -f "$SOURCE_CONTEXT_FILE" ]]; then
            SOURCE_CONTEXT_FILE=""
          fi

          bash forgis/agent/run_aider.sh

      - name: Run configured validation commands
        env:
          TARGET_REPO_DIR: ${{ github.workspace }}/target-repo
        run: |
          if [[ "$RUN_AGENT" != "true" ]]; then
            echo "RUN_AGENT is false. Skipping validation commands."
            exit 0
          fi

          bash forgis/agent/build_target.sh

      - name: Append long-term Forgis log
        if: ${{ always() && steps.resolve_base.outcome == 'success' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          AIDER_EXECUTED="false"
          AIDER_EXIT_STATUS="not-run"
          if [[ -f "$GITHUB_WORKSPACE/forgis-runtime/aider_status.env" ]]; then
            source "$GITHUB_WORKSPACE/forgis-runtime/aider_status.env"
            AIDER_EXECUTED="${aider_executed:-false}"
            AIDER_EXIT_STATUS="${aider_exit_status:-not-run}"
          fi

          python forgis/agent/write_run_log.py \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --source-repo "$SOURCE_REPO" \
            --source-ref "$SOURCE_REF" \
            --target-repo "$TARGET_REPO" \
            --target-base-branch "$TARGET_BASE_BRANCH" \
            --target-branch "$TARGET_BRANCH" \
            --target-subdir "$TARGET_SUBDIR" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --config-path "$CONFIG_PATH" \
            --agent-backend "$AGENT_BACKEND" \
            --model "$AIDER_MODEL" \
            --run-log-path "$RUN_LOG_PATH" \
            --dry-run "$DRY_RUN" \
            --run-agent "$RUN_AGENT" \
            --run-agent-config "$RUN_AGENT_CONFIG" \
            --confirm-real-run "$CONFIRM_REAL_RUN" \
            --aider-executed "$AIDER_EXECUTED" \
            --aider-exit-status "$AIDER_EXIT_STATUS" \
            --guardrail-result "See workflow logs." \
            --validation-commands-json "$VALIDATION_COMMANDS_JSON" \
            --success-checks-json "$SUCCESS_CHECKS_JSON" \
            --append-target-log "$RUN_AGENT" \
            --run-id "${{ github.run_id }}" \
            --run-url "$RUN_URL" \
            --validation-result "See workflow logs." \
            --summary "Forgis resolved config, built a thin Aider message, and ran the enabled generic steps." \
            --next-steps "Review changed files inside $TARGET_SUBDIR/." \
            --preview-output "$GITHUB_WORKSPACE/forgis-runtime/forgis_log_entry.md"

      - name: Verify source repository stayed read-only
        if: ${{ always() && steps.resolve_base.outcome == 'success' }}
        run: |
          python forgis/agent/guardrails.py check-source-clean \
            --source "$GITHUB_WORKSPACE/source-repo"

      - name: Verify target writable scope
        if: ${{ always() && steps.resolve_base.outcome == 'success' }}
        run: |
          python forgis/agent/guardrails.py check-target-scope \
            --target "$GITHUB_WORKSPACE/target-repo" \
            --target-subdir "$TARGET_SUBDIR" \
            --read-only-path "$CONFIG_PATH" \
            --read-only-path "$TASK_PROMPT_PATH"

      - name: Show target repository diff
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE/target-repo"
          echo "Git status:"
          git status --short || true
          echo "Git diff stat:"
          git diff --stat || true

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.FORGIS_TARGET_TOKEN }}
          TARGET_REPO_DIR: ${{ github.workspace }}/target-repo
        run: |
          if [[ "$RUN_AGENT" != "true" ]]; then
            echo "RUN_AGENT is false. Skipping push and pull request creation."
            exit 0
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY_RUN is true. Skipping push and pull request creation."
            exit 0
          fi

          if [[ "$CONFIRM_REAL_RUN" != "true" ]]; then
            echo "Real Forgis runs require confirm_real_run: true in FORGIS_CONFIG.yml."
            exit 1
          fi

          bash forgis/agent/create_pr.sh

      - name: Package target output snapshot
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/forgis-runtime"
          tar -czf "$GITHUB_WORKSPACE/forgis-runtime/target-repo-snapshot.tar.gz" \
            -C "$GITHUB_WORKSPACE" \
            target-repo

      - name: Upload resolved config summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-resolved-config
          path: forgis-runtime/resolved_config.md

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-run-summary
          path: forgis-runtime/run_summary.md

      - name: Upload source context
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-source-context
          path: forgis-runtime/source_context.md

      - name: Upload Aider message diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-message-diagnostics
          path: |
            forgis-runtime/forgis_message.md
            forgis-runtime/message_diagnostics.md
            forgis-runtime/aider_message_diagnostics.md
            forgis-runtime/aider_command_summary.md

      - name: Upload generated long log preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-long-log-preview
          path: forgis-runtime/forgis_log_entry.md

      - name: Upload target output snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-target-repo
          path: forgis-runtime/target-repo-snapshot.tar.gz
