name: Forgis Migration Scaffold

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repository containing FORGIS_CONFIG.yml and FORGIS_TASK.md, for example owner/target-repo"
        required: true
        type: string

      source_repo:
        description: "Optional override: source repository, for example owner/source-repo"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  scaffold:
    name: Run Forgis migration scaffold
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Forgis
        uses: actions/checkout@v4
        with:
          path: forgis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r forgis/requirements.txt

      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          token: ${{ secrets.FORGIS_TARGET_TOKEN }}
          path: target-output
          fetch-depth: 0

      - name: Resolve Forgis config
        id: resolve
        run: |
          mkdir -p "$GITHUB_WORKSPACE/forgis-runtime"

          python forgis/agent/resolve_config.py \
            --target "$GITHUB_WORKSPACE/target-output" \
            --target-repo "${{ inputs.target_repo }}" \
            --source-repo "${{ inputs.source_repo }}" \
            --github-env "$GITHUB_ENV" \
            --github-output "$GITHUB_OUTPUT" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/resolved_config.md"

      - name: Checkout resolved target base branch
        run: |
          cd "$GITHUB_WORKSPACE/target-output"
          git fetch origin "$TARGET_BASE_BRANCH"
          git checkout -B "$TARGET_BASE_BRANCH" "origin/$TARGET_BASE_BRANCH"

      - name: Resolve Forgis config from base branch
        id: resolve_base
        run: |
          python forgis/agent/resolve_config.py \
            --target "$GITHUB_WORKSPACE/target-output" \
            --target-repo "${{ inputs.target_repo }}" \
            --source-repo "${{ inputs.source_repo }}" \
            --github-env "$GITHUB_ENV" \
            --github-output "$GITHUB_OUTPUT" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/resolved_config.md"

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve_base.outputs.source_repo }}
          ref: ${{ steps.resolve_base.outputs.source_ref }}
          token: ${{ secrets.FORGIS_SOURCE_TOKEN }}
          path: source-repo
          persist-credentials: false

      - name: Run Forgis controller
        run: |
          python forgis/agent/forge.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --target "$GITHUB_WORKSPACE/target-output" \
            --rules "$GITHUB_WORKSPACE/forgis/rules" \
            --source-repo "$SOURCE_REPO" \
            --source-ref "$SOURCE_REF" \
            --target-repo "$TARGET_REPO" \
            --platform "$TARGET_PLATFORM" \
            --target-stack "$TARGET_STACK" \
            --migration-profile "$MIGRATION_PROFILE" \
            --target-branch "$TARGET_BRANCH" \
            --target-base-branch "$TARGET_BASE_BRANCH" \
            --config-path "$CONFIG_PATH" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --target-subdir "$TARGET_SUBDIR" \
            --run-log-path "$RUN_LOG_PATH" \
            --model "$AIDER_MODEL" \
            --dry-run "$DRY_RUN" \
            --run-ai "$RUN_AIDER" \
            --confirm-real-run "$CONFIRM_REAL_RUN" \
            --summary-output "$GITHUB_WORKSPACE/forgis-runtime/run_summary.md"

      - name: Collect source bundle and manifest
        run: |
          python forgis/agent/collect_source.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --output "$GITHUB_WORKSPACE/forgis-runtime/source_bundle.md" \
            --manifest-output "$GITHUB_WORKSPACE/forgis-runtime/source_manifest.md"

      - name: Build Forgis migration prompt
        run: |
          python forgis/agent/build_prompt.py \
            --source "$GITHUB_WORKSPACE/source-repo" \
            --target "$GITHUB_WORKSPACE/target-output" \
            --rules "$GITHUB_WORKSPACE/forgis/rules" \
            --prompts "$GITHUB_WORKSPACE/forgis/prompts" \
            --platform "$TARGET_PLATFORM" \
            --target-stack "$TARGET_STACK" \
            --migration-profile "$MIGRATION_PROFILE" \
            --source-bundle "$GITHUB_WORKSPACE/forgis-runtime/source_bundle.md" \
            --source-manifest "$GITHUB_WORKSPACE/forgis-runtime/source_manifest.md" \
            --config-path "$CONFIG_PATH" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --require-task-prompt \
            --target-subdir "$TARGET_SUBDIR" \
            --run-log-path "$RUN_LOG_PATH" \
            --output "$GITHUB_WORKSPACE/forgis-runtime/forgis_prompt.md"

          test -f "$GITHUB_WORKSPACE/forgis-runtime/forgis_prompt.md"

      - name: Check shell scaffolds
        run: |
          bash -n forgis/agent/run_aider.sh
          bash -n forgis/agent/build_target.sh
          bash -n forgis/agent/create_pr.sh

      - name: Install and check Aider if enabled
        run: |
          if [[ "$RUN_AIDER" != "true" ]]; then
            echo "RUN_AIDER is false. Skipping Aider installation."
            exit 0
          fi

          pip install aider-chat
          aider --version

      - name: Run Aider with configured model
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_REPO_DIR: ${{ github.workspace }}/target-output
          FORGIS_PROMPT_FILE: ${{ github.workspace }}/forgis-runtime/forgis_prompt.md
        run: |
          if [[ "$RUN_AIDER" != "true" ]]; then
            echo "RUN_AIDER is false. Skipping Aider execution."
            exit 0
          fi

          bash forgis/agent/run_aider.sh

      - name: Build target repository
        env:
          TARGET_REPO_DIR: ${{ github.workspace }}/target-output
        run: |
          if [[ "$RUN_AIDER" != "true" ]]; then
            echo "RUN_AIDER is false. Skipping target build."
            exit 0
          fi

          bash forgis/agent/build_target.sh

      - name: Append long-term Forgis log
        if: ${{ always() && steps.resolve_base.outcome == 'success' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python forgis/agent/write_run_log.py \
            --target "$GITHUB_WORKSPACE/target-output" \
            --source-repo "$SOURCE_REPO" \
            --source-ref "$SOURCE_REF" \
            --target-repo "$TARGET_REPO" \
            --target-base-branch "$TARGET_BASE_BRANCH" \
            --target-branch "$TARGET_BRANCH" \
            --target-platform "$TARGET_PLATFORM" \
            --target-stack "$TARGET_STACK" \
            --migration-profile "$MIGRATION_PROFILE" \
            --target-subdir "$TARGET_SUBDIR" \
            --task-prompt-path "$TASK_PROMPT_PATH" \
            --config-path "$CONFIG_PATH" \
            --model "$AIDER_MODEL" \
            --run-log-path "$RUN_LOG_PATH" \
            --dry-run "$DRY_RUN" \
            --run-aider "$RUN_AIDER" \
            --run-aider-config "$RUN_AIDER_CONFIG" \
            --confirm-real-run "$CONFIRM_REAL_RUN" \
            --append-target-log "$RUN_AIDER" \
            --run-url "$RUN_URL" \
            --build-result "See workflow logs for build and guardrail checks." \
            --summary "Forgis resolved config, built the final prompt, and ran the enabled migration steps." \
            --next-steps "Review generated files inside $TARGET_SUBDIR/." \
            --preview-output "$GITHUB_WORKSPACE/forgis-runtime/forgis_log_entry.md"

      - name: Verify source repository stayed read-only
        if: ${{ always() && steps.resolve_base.outcome == 'success' }}
        run: |
          python forgis/agent/guardrails.py check-source-clean \
            --source "$GITHUB_WORKSPACE/source-repo"

      - name: Verify target writable scope
        if: ${{ always() && steps.resolve_base.outcome == 'success' }}
        run: |
          python forgis/agent/guardrails.py check-target-scope \
            --target "$GITHUB_WORKSPACE/target-output" \
            --target-subdir "$TARGET_SUBDIR" \
            --read-only-path "$CONFIG_PATH" \
            --read-only-path "$TASK_PROMPT_PATH"

      - name: Show target repository diff
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE/target-output"
          echo "Git status:"
          git status --short || true
          echo "Git diff stat:"
          git diff --stat || true

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.FORGIS_TARGET_TOKEN }}
          TARGET_REPO_DIR: ${{ github.workspace }}/target-output
        run: |
          if [[ "$RUN_AIDER" != "true" ]]; then
            echo "RUN_AIDER is false. Skipping push and pull request creation."
            exit 0
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY_RUN is true. Skipping push and pull request creation."
            exit 0
          fi

          if [[ "$CONFIRM_REAL_RUN" != "true" ]]; then
            echo "Real AI migration requires confirm_real_run: true in FORGIS_CONFIG.yml."
            exit 1
          fi

          bash forgis/agent/create_pr.sh

      - name: Package target output snapshot
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/forgis-runtime"
          tar -czf "$GITHUB_WORKSPACE/forgis-runtime/target-output-snapshot.tar.gz" \
            -C "$GITHUB_WORKSPACE" \
            target-output

      - name: Upload resolved config summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-resolved-config
          path: forgis-runtime/resolved_config.md

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-run-summary
          path: forgis-runtime/run_summary.md

      - name: Upload source bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-source-bundle
          path: forgis-runtime/source_bundle.md

      - name: Upload source manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-source-manifest
          path: forgis-runtime/source_manifest.md

      - name: Upload generated Forgis prompt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-generated-prompt
          path: forgis-runtime/forgis_prompt.md

      - name: Upload generated long log preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-long-log-preview
          path: forgis-runtime/forgis_log_entry.md

      - name: Upload target output snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forgis-target-output
          path: forgis-runtime/target-output-snapshot.tar.gz
