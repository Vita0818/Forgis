# Forgis v7.1 local OpenAI-compatible example.
# Non-streaming Chat Completions only. Do not put API keys in this file.
# Run with:
#   python -m agent.cli init --source /path/to/source --target /path/to/target \
#     --target-repo local/my-migration --output /path/to/FORGIS_CONFIG.local.yml
#   export FORGIS_MODEL_API_KEY="..."
#   python -m agent.cli status --config /path/to/FORGIS_CONFIG.local.yml
#   python -m agent.cli run --config /path/to/FORGIS_CONFIG.local.yml --unit <unit-id>

source_repo: local/source
source_ref: main
target_branch: forgis/local-openai-compatible
target_base_branch: main
target_subdir: target-output
task_prompt_path: FORGIS_TASK.md

agent_backend: openai-compatible
model: deepseek-chat
api_base: https://api.deepseek.com/v1
api_format: openai-compatible
request_timeout_seconds: 120
model_env:
  api_key: FORGIS_MODEL_API_KEY

execution_mode: tool_loop
dry_run: false
run_agent: true
confirm_real_run: true

run_report_enabled: true
run_report_output_dir: reports
migration_scheduler_enabled: true
migration_plan_persistence_enabled: true
migration_plan_output_dir: reports
migration_plan_resume_enabled: true

# Source is read-only. Writes remain limited to target_subdir.
# v7.1 does not support streaming, a local server, council, GUI, or automatic screenshots.
